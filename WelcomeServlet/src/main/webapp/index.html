<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Portal | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #f1f5f9;
        }
        .welcome-login {
            background: rgba(30, 41, 59, 0.7);
            padding: 4rem 3rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
        }
        h1 { font-size: 2.25rem; color: #f1f5f9; margin-bottom: 0.75rem; font-weight: 700; }
        p { color: #94a3b8; margin-bottom: 2.5rem; font-size: 1rem; }
        
        form { text-align: center; }
        
        .welcome-btn {
            background: #38bdf8;
            color: #0f172a;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 1rem;
            font-weight: 700;
            font-family: inherit;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.39);
        }
        .welcome-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.45);
            background: #7dd3fc;
        }
    </style>
</head>
<body>
    <div class="welcome-login">
        <h1>Welcome Portal</h1>
        <p>Awaiting terminal authorization...</p>
        
        <form action="welcomeservlet" method="POST">
            <button type="submit" class="welcome-btn">Initialize Connection</button>
        </form>
    </div>
</body>
</html>
